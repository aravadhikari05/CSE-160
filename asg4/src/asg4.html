<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Blocky 3D Animal</title>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>

    <p>
    <button id="normal-on"> Normal On</button>
    <button id="normal-off"> Normal Off</button>
    <p>
    <button id="light-on"> Light On</button>
    <button id="light-off"> Light Off</button>

    <p>
      Light X <input type="range" min="-250" max="250" value="0" class="slider" id="lightSlideX">
      Light Y <input type="range" min="-250" max="250" value="100" class="slider" id="lightSlideY">
      Light Z <input type="range" min="-250" max="250" value="-200" class="slider" id="lightSlideZ">
    </p>

    <p id="fps"></p>
    <p id="treasure-hud" style="color:gold;">
      Treasures: <span id="treasure-count">0</span> / <span id="treasure-total">0</span>
    </p>
    <p id="treasure-win" style="display:none; color:gold;">
      You found all the treasure!
    </p>




    <script src="../lib/webgl-utils.js"></script>
    <script src="../lib/webgl-debug.js"></script>
    <script src="../lib/cuon-utils.js"></script>
    <script src="../lib/cuon-matrix-cse160.js"></script>
    <script src="Map.js"></script>
    <script src="asg4.js"></script>
    <script src="Triangle.js"></script>
    <script src="Cube.js"></script>
    <script src="Sphere.js"></script>
=    <script src = "Camera.js"></script>
    <script src = "Model.js"></script>
  </body>
</html>
